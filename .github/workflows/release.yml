name: Auto Build and Release APK

on:
  push:
    tags:
      - '20*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: コードの取得（リポジトリのクローン）
        uses: actions/checkout@v4

      - name: Javaのセットアップ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle（9.3.1）の指定
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: APKの全自動錬成（gradlewを使わずビルド）
        run: gradle assembleDebug

      - name: 自動リネームとコピー
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/connect_checker-${{ github.ref_name }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/connect_checker-latest.apk

      - name: GitHub Releasesへの自動アップロード
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/connect_checker-${{ github.ref_name }}.apk
            app/build/outputs/apk/debug/connect_checker-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}